version: '3.8'

services:
  # ============================================
  # Next.js 应用服务
  # ============================================
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xinqi-web
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=5000
      - HOSTNAME=0.0.0.0
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - xinqi-network

networks:
  xinqi-network:
    driver: bridge
